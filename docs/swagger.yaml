definitions:
  controller.ClickRequest:
    properties:
      email:
        type: string
      selector:
        type: string
    type: object
  controller.Request:
    properties:
      email:
        type: string
      passs:
        type: string
    type: object
  controller.ResponseSession:
    properties:
      cookies:
        type: string
      email:
        type: string
      screenshot:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/session:
    delete:
      description: Delete session from MongoDB and close browser
      parameters:
      - description: Email
        in: query
        name: email
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete session
      tags:
      - session
    get:
      description: Get list of active sessions with cookies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/controller.ResponseSession'
            type: array
      summary: List sessions
      tags:
      - session
    post:
      consumes:
      - application/json
      description: Create a new session and save cookies to MongoDB
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login session
      tags:
      - session
  /api/session/check:
    get:
      description: Check if session is still valid
      parameters:
      - description: Email
        in: query
        name: email
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Check session
      tags:
      - session
  /api/session/click:
    post:
      consumes:
      - application/json
      description: Click an element in the session
      parameters:
      - description: Click request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controller.ClickRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Clicked
          schema:
            type: string
      summary: Click element
      tags:
      - session
swagger: "2.0"
